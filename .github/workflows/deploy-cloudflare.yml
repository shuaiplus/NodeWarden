name: Deploy to Cloudflare Workers

# =============================================
# 触发条件：
# 1. 推送到 main 分支时自动部署
# 2. 手动触发（workflow_dispatch）可选择存储类型
# =============================================
on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      storage_type:
        description: '附件存储类型 (R2 或 KV)'
        required: false
        default: ''
        type: choice
        options:
          - R2
          - KV
permissions:
  contents: write
  actions: write

# =============================================
# 全局环境变量：
# =============================================
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Cloudflare API 令牌（必填）
  # 创建地址：https://dash.cloudflare.com/profile/api-tokens
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN }}
  # Cloudflare 账户 ID（必填）
  # 可在 Cloudflare 仪表板 URL 中找到（如：https://dash.cloudflare.com/XXXXXXXX）
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID }}
  # JWT 密钥（可选，用于用户认证）
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  # 附件存储类型（可选，默认 R2）
  # 可选值：R2 / KV（不配置则默认为 R2）
  STORAGE_TYPE: ${{ vars.STORAGE_TYPE || 'R2' }}

# =============================================
# 任务列表
# =============================================
jobs:
  # -------------------------------------------
  # R2 存储模式部署任务
  # -------------------------------------------
  deploy-R2:
    name: Deploy with R2 Storage
    runs-on: ubuntu-latest
    # 触发条件：选择了 R2，或默认情况（都没选时默认用 R2）
    if: github.event.inputs.storage_type == 'R2' || vars.STORAGE_TYPE == 'R2' || (github.event.inputs.storage_type == '' && vars.STORAGE_TYPE == '')
    steps:
      # 步骤1：检出代码仓库
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤2：设置 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 步骤3：安装项目依赖
      - name: Install dependencies
        run: npm ci

      # 步骤4：禁用 wrangler 遥测（避免发送使用数据）
      - name: Disable wrangler telemetry
        run: npx wrangler telemetry disable

      # 步骤5：创建 D1 数据库（如果已存在则跳过）
      - name: Create D1 Database
        run: |
          if npx wrangler d1 create nodewarden-db 2>/dev/null; then
            echo "✅ D1 database created."
          else
            echo "✅ D1 database already exists."
          fi

      # 步骤6：应用数据库迁移（创建数据表结构）
      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply nodewarden-db --local
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      # 步骤7：创建 R2 存储桶（如果已存在则跳过）
      - name: Create R2 Bucket
        run: |
          if npx wrangler r2 bucket create nodewarden-attachments 2>/dev/null; then
            echo "✅ R2 bucket created."
          else
            echo "✅ R2 bucket already exists."
          fi

      # 步骤8：设置 JWT 密钥（可选）
      # - 如果设置了 JWT_SECRET，则上传到 Cloudflare
      # - 如果没设置，则跳过此步骤
      - name: Set up JWT Secret
        run: |
          if [ -n "$JWT_SECRET" ]; then
            echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET
          fi

      # 步骤9：部署到 Cloudflare Workers
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.toml

  # -------------------------------------------
  # KV 存储模式部署任务
  # -------------------------------------------
  deploy-KV:
    name: Deploy with KV Storage
    runs-on: ubuntu-latest
    # 触发条件：选择了 KV
    if: github.event.inputs.storage_type == 'KV' || vars.STORAGE_TYPE == 'KV'
    steps:
      # 步骤1：检出代码仓库
      - name: Checkout
        uses: actions/checkout@v4

      # 步骤2：设置 Node.js 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 步骤3：安装项目依赖
      - name: Install dependencies
        run: npm ci

      # 步骤4：禁用 wrangler 遥测
      - name: Disable wrangler telemetry
        run: npx wrangler telemetry disable

      # 步骤5：创建 D1 数据库（如果已存在则跳过）
      - name: Create D1 Database
        run: |
          if npx wrangler d1 create nodewarden-db 2>/dev/null; then
            echo "✅ D1 database created."
          else
            echo "✅ D1 database already exists."
          fi

      # 步骤6：应用数据库迁移
      - name: Apply D1 Migrations
        run: npx wrangler d1 migrations apply nodewarden-db --local
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}

      # 步骤7：设置 JWT 密钥（可选）
      - name: Set up JWT Secret
        run: |
          if [ -n "$JWT_SECRET" ]; then
            echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET
          fi

      # 步骤8：部署到 Cloudflare Workers
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy -c wrangler.kv.toml
